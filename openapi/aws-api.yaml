openapi: 3.0.3
info:
  title: Calorie Compass AWS API
  version: 0.1.0
  description: Minimal authenticated API contract for Cognito + API Gateway + Lambda.
servers:
  - url: https://iaerxz52fj.execute-api.eu-south-2.amazonaws.com
security:
  - bearerAuth: []
paths:
  /me:
    get:
      operationId: getMe
      summary: Returns authenticated user claims
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /foods:
    get:
      operationId: getFoods
      summary: Lists foods for authenticated user
      responses:
        '200':
          description: User foods
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Food'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createFood
      summary: Creates a food for authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFoodRequest'
      responses:
        '201':
          description: Food created
          content:
            application/json:
              schema:
                type: object
                required:
                  - item
                properties:
                  item:
                    $ref: '#/components/schemas/Food'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /foods/{id}:
    put:
      operationId: updateFood
      summary: Updates a food for authenticated user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFoodRequest'
      responses:
        '200':
          description: Food updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - item
                properties:
                  item:
                    $ref: '#/components/schemas/Food'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /foods/barcode/{barcode}:
    get:
      operationId: getFoodByBarcode
      summary: Looks up a product by barcode for authenticated user
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
            pattern: '^(\d{8}|\d{12}|\d{13})$'
      responses:
        '200':
          description: Product already exists or found with complete macros
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/BarcodeLookupExistsResponse'
                  - $ref: '#/components/schemas/GetFoodByBarcode200'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Product found but nutriments are incomplete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFoodByBarcode422'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
  /favorites:
    get:
      operationId: getFavorites
      summary: Lists favorite recipes for authenticated user
      responses:
        '200':
          description: User favorite recipes
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/FavoriteDish'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createFavorite
      summary: Creates a favorite recipe for authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFavoriteDishRequest'
      responses:
        '201':
          description: Favorite recipe created
          content:
            application/json:
              schema:
                type: object
                required:
                  - item
                properties:
                  item:
                    $ref: '#/components/schemas/FavoriteDish'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /favorites/{id}:
    get:
      operationId: getFavoriteById
      summary: Gets favorite recipe detail for authenticated user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Favorite recipe detail
          content:
            application/json:
              schema:
                type: object
                required:
                  - item
                properties:
                  item:
                    $ref: '#/components/schemas/FavoriteDish'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteFavorite
      summary: Deletes a favorite recipe for authenticated user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Favorite recipe deleted
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    GatewayTimeout:
      description: Upstream timeout
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateFoodConflictResponse'

  schemas:
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    MacroNutrients:
      type: object
      required:
        - calories
        - protein
        - carbs
        - fats
      properties:
        calories:
          type: number
        protein:
          type: number
        carbs:
          type: number
        fats:
          type: number

    MacroNutrientsNullable:
      type: object
      required:
        - calories
        - protein
        - carbs
        - fats
      properties:
        calories:
          type: number
          nullable: true
        protein:
          type: number
          nullable: true
        carbs:
          type: number
          nullable: true
        fats:
          type: number
          nullable: true

    Supermarket:
      type: string
      enum:
        - carrefour
        - mercadona
        - lidl
        - aldi
        - eroski

    MeasurementUnit:
      type: string
      enum:
        - g

    FavoriteDishDifficulty:
      type: string
      enum:
        - Facil
        - Media
        - Alta

    FavoriteDishItem:
      type: object
      required:
        - foodId
        - quantity
      properties:
        foodId:
          type: string
        quantity:
          type: number
          minimum: 0.1

    FavoriteDish:
      type: object
      required:
        - id
        - userId
        - name
        - description
        - imageUri
        - prepMinutes
        - difficulty
        - servings
        - tags
        - steps
        - items
        - createdAt
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        description:
          type: string
        imageUri:
          type: string
        prepMinutes:
          type: number
        difficulty:
          $ref: '#/components/schemas/FavoriteDishDifficulty'
        servings:
          type: number
        tags:
          type: array
          items:
            type: string
        steps:
          type: array
          items:
            type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/FavoriteDishItem'
        createdAt:
          type: string
          format: date-time

    CreateFavoriteDishRequest:
      type: object
      required:
        - name
        - description
        - imageUri
        - prepMinutes
        - difficulty
        - servings
        - tags
        - steps
        - items
      properties:
        name:
          type: string
        description:
          type: string
        imageUri:
          type: string
        prepMinutes:
          type: number
          minimum: 0
        difficulty:
          $ref: '#/components/schemas/FavoriteDishDifficulty'
        servings:
          type: number
          minimum: 0.1
        tags:
          type: array
          items:
            type: string
        steps:
          type: array
          items:
            type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/FavoriteDishItem'

    Food:
      type: object
      required:
        - id
        - name
        - referenceAmount
        - referenceUnit
        - referenceMacros
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        referenceAmount:
          type: number
          example: 100
        referenceUnit:
          $ref: '#/components/schemas/MeasurementUnit'
        referenceMacros:
          $ref: '#/components/schemas/MacroNutrients'
        defaultServingAmount:
          type: number
          nullable: true
        barcode:
          type: string
          nullable: true
        brand:
          type: string
          nullable: true
        supermarket:
          allOf:
            - $ref: '#/components/schemas/Supermarket'
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateFoodRequest:
      type: object
      required:
        - name
        - referenceAmount
        - referenceMacros
      properties:
        name:
          type: string
        referenceAmount:
          type: number
          minimum: 0.1
        barcode:
          type: string
          pattern: '^(\d{8}|\d{12}|\d{13})$'
        brand:
          type: string
        referenceMacros:
          $ref: '#/components/schemas/MacroNutrients'
        defaultServingAmount:
          type: number
          minimum: 0.1
        supermarket:
          allOf:
            - $ref: '#/components/schemas/Supermarket'
          nullable: true

    CreateFoodConflictResponse:
      type: object
      required:
        - message
        - barcode
        - existingFoodId
        - existingFoodName
      properties:
        message:
          type: string
        barcode:
          type: string
        existingFoodId:
          type: string
        existingFoodName:
          type: string

    UpdateFoodRequest:
      type: object
      required:
        - name
        - referenceAmount
        - referenceMacros
      properties:
        name:
          type: string
        referenceAmount:
          type: number
          minimum: 0.1
        barcode:
          type: string
          pattern: '^(\d{8}|\d{12}|\d{13})$'
        brand:
          type: string
        referenceMacros:
          $ref: '#/components/schemas/MacroNutrients'
        defaultServingAmount:
          type: number
          minimum: 0.1
        supermarket:
          allOf:
            - $ref: '#/components/schemas/Supermarket'
          nullable: true

    BarcodeLookupItem:
      type: object
      required:
        - barcode
        - detectedName
        - referenceAmount
        - referenceUnit
        - referenceMacros
        - source
        - fetchedAt
        - confidence
      properties:
        barcode:
          type: string
        detectedName:
          type: string
        brand:
          type: string
          nullable: true
        referenceAmount:
          type: number
          example: 100
        referenceUnit:
          $ref: '#/components/schemas/MeasurementUnit'
        referenceMacros:
          $ref: '#/components/schemas/MacroNutrients'
        source:
          type: string
          enum:
            - openfoodfacts
        fetchedAt:
          type: string
          format: date-time
        confidence:
          type: number

    BarcodeLookupItemIncomplete:
      allOf:
        - $ref: '#/components/schemas/BarcodeLookupItem'
        - type: object
          properties:
            referenceMacros:
              $ref: '#/components/schemas/MacroNutrientsNullable'

    BarcodeLookupExistsResponse:
      type: object
      required:
        - status
        - barcode
        - existingFoodId
        - existingFoodName
      properties:
        status:
          type: string
          enum:
            - exists
        barcode:
          type: string
        existingFoodId:
          type: string
        existingFoodName:
          type: string

    GetFoodByBarcode200:
      type: object
      required:
        - status
        - item
      properties:
        status:
          type: string
          enum:
            - found
        item:
          $ref: '#/components/schemas/BarcodeLookupItem'

    GetFoodByBarcode422:
      type: object
      required:
        - message
        - item
      properties:
        message:
          type: string
        item:
          $ref: '#/components/schemas/BarcodeLookupItemIncomplete'

    MeResponse:
      type: object
      required:
        - sub
      properties:
        sub:
          type: string
        email:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        tokenUse:
          type: string
          nullable: true
