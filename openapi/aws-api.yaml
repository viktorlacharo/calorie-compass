openapi: 3.0.3
info:
  title: Calorie Compass AWS API
  version: 0.1.0
  description: Minimal authenticated API contract for Cognito + API Gateway + Lambda.
servers:
  - url: https://iaerxz52fj.execute-api.eu-south-2.amazonaws.com
security:
  - bearerAuth: []
paths:
  /me:
    get:
      operationId: getMe
      summary: Returns authenticated user claims
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /foods:
    get:
      operationId: getFoods
      summary: Lists foods for authenticated user
      responses:
        '200':
          description: User foods
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Food'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createFood
      summary: Creates a food for authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFoodRequest'
      responses:
        '201':
          description: Food created
          content:
            application/json:
              schema:
                type: object
                required:
                  - item
                properties:
                  item:
                    $ref: '#/components/schemas/Food'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    MacroNutrients:
      type: object
      required:
        - calories
        - protein
        - carbs
        - fats
      properties:
        calories:
          type: number
        protein:
          type: number
        carbs:
          type: number
        fats:
          type: number

    Supermarket:
      type: string
      enum:
        - carrefour
        - mercadona
        - lidl
        - aldi
        - eroski

    MeasurementUnit:
      type: string
      enum:
        - g

    Food:
      type: object
      required:
        - id
        - name
        - referenceAmount
        - referenceUnit
        - referenceMacros
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        referenceAmount:
          type: number
          example: 100
        referenceUnit:
          $ref: '#/components/schemas/MeasurementUnit'
        referenceMacros:
          $ref: '#/components/schemas/MacroNutrients'
        defaultServingAmount:
          type: number
          nullable: true
        supermarket:
          allOf:
            - $ref: '#/components/schemas/Supermarket'
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateFoodRequest:
      type: object
      required:
        - name
        - referenceMacros
      properties:
        name:
          type: string
        referenceMacros:
          $ref: '#/components/schemas/MacroNutrients'
        defaultServingAmount:
          type: number
          minimum: 0.1
        supermarket:
          allOf:
            - $ref: '#/components/schemas/Supermarket'
          nullable: true

    MeResponse:
      type: object
      required:
        - sub
      properties:
        sub:
          type: string
        email:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        tokenUse:
          type: string
          nullable: true
